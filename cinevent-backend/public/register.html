<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CinEvent – Inscription Spectateur</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      color: #fff;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(to right, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p { color: #aaa; font-size: 0.9rem; margin-top: 4px; }
    h2 { font-size: 1.4rem; margin-bottom: 24px; text-align: center; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: #ccc; }
    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #f7971e; }
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    .btn-primary {
      background: linear-gradient(to right, #f7971e, #ffd200);
      color: #111;
      margin-bottom: 12px;
    }
    .btn-google {
      background: #fff;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-google img { width: 20px; height: 20px; }
    .divider {
      text-align: center;
      margin: 16px 0;
      color: #888;
      font-size: 0.85rem;
      position: relative;
    }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .footer-link {
      text-align: center;
      margin-top: 22px;
      font-size: 0.88rem;
      color: #aaa;
    }
    .footer-link a { color: #ffd200; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      display: none;
    }
    .alert-error { background: rgba(255,80,80,0.2); border: 1px solid rgba(255,80,80,0.4); color: #ff8080; }
    .alert-success { background: rgba(80,200,120,0.2); border: 1px solid rgba(80,200,120,0.4); color: #80ffaa; }
    .role-badge {
      display: inline-block;
      background: rgba(247,151,30,0.2);
      border: 1px solid rgba(247,151,30,0.4);
      color: #ffd200;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🎬 CinEvent</h1>
      <p>Votre plateforme cinéma</p>
    </div>
    <h2>Inscription Spectateur</h2>
    <div style="text-align:center"><span class="role-badge">🎟️ Compte Spectateur</span></div>

    <div id="alert" class="alert"></div>

    <form id="registerForm">
      <div class="form-group">
        <label for="name">Nom complet</label>
        <input type="text" id="name" placeholder="Votre nom" required />
      </div>
      <div class="form-group">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" placeholder="exemple@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" placeholder="Minimum 6 caractères" minlength="6" required />
      </div>
      <div class="form-group">
        <label for="confirm">Confirmer le mot de passe</label>
        <input type="password" id="confirm" placeholder="Répétez votre mot de passe" required />
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">Créer mon compte</button>
    </form>

    <div class="divider">ou</div>

    <button class="btn btn-google" id="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
      S'inscrire avec Google
    </button>

    <div class="footer-link">
      Déjà un compte ? <a href="login.html">Se connecter</a>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // Firebase client config is intentionally public. Enable Firebase App Check in production.
    const firebaseConfig = {
      apiKey: "AIzaSyBjvb4nQAe8xKqdBHf8asQrX55dienhTpg",
      authDomain: "cineevent-1a246.firebaseapp.com",
      projectId: "cineevent-1a246",
      storageBucket: "cineevent-1a246.firebasestorage.app",
      messagingSenderId: "20576254243",
      appId: "1:20576254243:web:8f82a576490760c4e0b496",
      measurementId: "G-5NSCZ3R6Z8"
    };

    const firebaseApp = initializeApp(firebaseConfig);
    const auth = getAuth(firebaseApp);
    const provider = new GoogleAuthProvider();

    const API_BASE = '/api';

    function showAlert(message, type = 'error') {
      const el = document.getElementById('alert');
      el.textContent = message;
      el.className = `alert alert-${type}`;
      el.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alert').style.display = 'none';
    }

    // Email/password registration
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        return showAlert('Les mots de passe ne correspondent pas.');
      }

      const btn = document.getElementById('registerBtn');
      btn.disabled = true;
      btn.textContent = 'Inscription…';

      try {
        const res = await fetch(`${API_BASE}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erreur lors de l\'inscription');
        localStorage.setItem('cinevent_token', data.token);
        localStorage.setItem('cinevent_user', JSON.stringify(data));
        showAlert('Compte créé avec succès ! Redirection…', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1400);
      } catch (err) {
        showAlert(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Créer mon compte';
      }
    });

    // Google Sign-Up
    document.getElementById('googleBtn').addEventListener('click', async () => {
      hideAlert();
      try {
        const result = await signInWithPopup(auth, provider);
        const idToken = await result.user.getIdToken();

        const res = await fetch(`${API_BASE}/auth/google`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ idToken }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Erreur Google Sign-In');
        localStorage.setItem('cinevent_token', data.token);
        localStorage.setItem('cinevent_user', JSON.stringify(data));
        showAlert('Compte Google créé avec succès ! Redirection…', 'success');
        setTimeout(() => { window.location.href = '/'; }, 1400);
      } catch (err) {
        showAlert(err.message);
      }
    });
  </script>
</body>
</html>
