# Development override – enables hot-reload for both backend and frontend.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# After the first build you can simply run:
#   docker compose -f docker-compose.dev.yml up
#
# Any change you save in ./cinevent-backend or ./cinevent-frontend is
# reflected immediately inside the running containers without rebuilding.

services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: cinevent_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - cinevent_net

  # ── Backend (Express / Node + nodemon) ────────────────────────────────────
  backend:
    build:
      context: ./cinevent-backend
      dockerfile: Dockerfile.dev
    container_name: cinevent_backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/cineevent
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
    ports:
      - "5000:5000"
    volumes:
      # Mount source code so nodemon picks up every saved change
      - ./cinevent-backend:/app
      # Keep the container's node_modules to avoid overwriting them
      - /app/node_modules
    networks:
      - cinevent_net

  # ── Frontend (React / Vite dev server with HMR) ───────────────────────────
  frontend:
    build:
      context: ./cinevent-frontend
      dockerfile: Dockerfile.dev
    container_name: cinevent_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      # Mount source code so Vite HMR pushes every saved change to the browser
      - ./cinevent-frontend:/app
      # Keep the container's node_modules to avoid overwriting them
      - /app/node_modules
    networks:
      - cinevent_net

volumes:
  mongo_data:

networks:
  cinevent_net:
    driver: bridge
